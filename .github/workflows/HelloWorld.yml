name: Hello World Action

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: say hello
        run: echo "Hello From Git Actions."

      - name: print date
        run: date

      - name: show working directory
        run: pwd && ls -la
